<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DNR.412 Workshop</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/login.css">
</head>
<body class="login-page">
    <div class="login-container">
        <!-- Background -->
        <div class="login-background">
            <img src="../public/images/image_2.jpg" alt="Background" class="background-image">
            <div class="background-overlay"></div>
        </div>

        <!-- Login Card -->
        <div class="login-card">
            <!-- Logo -->
            <div class="login-logo">
                <img src="../public/images/DNR.412 LOGO.png" alt="DNR.412 Logo" class="logo-image">
                <h2 class="mt-3">DNR.412 Workshop</h2>
                <p class="text-muted">Workshop Management System</p>
            </div>

            <!-- Divider -->
            <hr class="my-4">

            <!-- Form -->
            <form id="loginForm" class="login-form">
                <!-- Username -->
                <div class="form-group mb-3">
                    <label for="username" class="form-label">
                        <i class="bi bi-person"></i> Username
                    </label>
                    <input 
                        type="text" 
                        id="username" 
                        class="form-control form-control-lg" 
                        placeholder="Masukkan username"
                        required
                    >
                </div>

                <!-- Password -->
                <div class="form-group mb-3">
                    <label for="password" class="form-label">
                        <i class="bi bi-lock"></i> Password
                    </label>
                    <div class="input-group">
                        <input 
                            type="password" 
                            id="password" 
                            class="form-control form-control-lg" 
                            placeholder="Masukkan password"
                            required
                        >
                        <button 
                            class="btn btn-outline-secondary" 
                            type="button" 
                            id="togglePassword"
                            title="Tampilkan/Sembunyikan Password"
                        >
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- Remember Me -->
                <div class="form-check mb-3">
                    <input 
                        class="form-check-input" 
                        type="checkbox" 
                        id="rememberMe"
                    >
                    <label class="form-check-label" for="rememberMe">
                        Ingat saya
                    </label>
                </div>

                <!-- Error Message -->
                <div id="errorAlert" class="alert alert-danger d-none" role="alert">
                    <i class="bi bi-exclamation-circle"></i>
                    <span id="errorMessage"></span>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn btn-primary btn-lg w-100 mb-3">
                    <i class="bi bi-box-arrow-in-right"></i> Masuk
                </button>
            </form>

            <!-- Footer -->
            <div class="login-footer">
                <p class="text-muted text-center mb-0">
                    &copy; 2026 DNR.412 Workshop. All rights reserved.
                </p>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
    <!-- Config -->
    <script src="../assets/js/config.js"></script>
    <!-- Auth -->
    <script src="../assets/js/auth.js"></script>
    <!-- Router -->
    <script src="../assets/js/router.js"></script>
    <!-- Login Script -->
    <script src="../assets/js/login.js"></script>
</body>
</html>
